<div class="ordenes-container">
    <div class="ordenes-card">
    <h2>Órdenes generadas</h2>
    <p>Aquí se visualizan las órdenes creadas automáticamente o manualmente.</p>

      <table class="tabla-ordenes" *ngIf="ordenes.length > 0">
        <thead>
        <tr>
            <th>Tipo</th>
            <th>Máquina</th>
            <th>Actividad</th>
            <th>Tiempo estimado</th>
            <th>Estado</th>
        </tr>
        </thead>
        <tbody>
          <tr *ngFor="let orden of ordenes">
            <td>{{ orden.tipo }}</td>
            <td>{{ orden.maquina }}</td>
            <td>{{ orden.actividad }}</td>
            <td>{{ orden.tiempoEstimado }} min</td>
            <td>{{ orden.estado }}</td>
        </tr>
        </tbody>
    </table>

      <p *ngIf="ordenes.length === 0">No hay órdenes generadas aún.</p>
    </div>
</div>
